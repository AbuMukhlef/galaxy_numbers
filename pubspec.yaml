name: galaxy_numbers
description: مجرة الأرقام - لعبة تعليمية فضائية
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:       # دعم العربية والإنجليزية
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Cloud sync
  supabase_flutter: ^2.12.0

  # Image saving
  image_gallery_saver_plus: ^4.0.1

  # Utils
  uuid: ^4.5.3
  path_provider: ^2.1.5
  connectivity_plus: ^7.0.0

  # أصوات — أضف بعد وضع ملفات .mp3 في assets/sounds/
  # audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true               # مطلوب لـ l10n

  assets:
    - assets/sounds/

  # الخطوط — حمّلها من fonts.google.com/specimen/Cairo
  # وضعها في مجلد fonts/ ثم فك التعليق
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: fonts/Cairo-Regular.ttf
  #         weight: 400
  #       - asset: fonts/Cairo-Bold.ttf
  #         weight: 700
  #       - asset: fonts/Cairo-ExtraBold.ttf
  #         weight: 800
  #       - asset: fonts/Cairo-Black.ttf
  #         weight: 900
